<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">Импорт цитат</h3>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Выберите файл (CSV или JSON)</label>
                        <input type="file" name="file" class="form-control" accept=".csv,.json" required>
                        <div class="form-text">
                            Формат CSV: первая строка — заголовки: фильм, цитата, персонаж, таймкод
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Загрузить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
