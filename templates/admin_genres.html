<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Админ-панель</h1>
</div>

<div class="btn-group mb-4 w-100">
    <a href="{{ url_for('admin_movies') }}" class="btn btn-outline-primary btn-lg">Фильмы</a>
    <a href="{{ url_for('admin_genres') }}" class="btn btn-primary btn-lg active">Жанры</a>
</div>

<div class="mb-4">
    <a href="{{ url_for('admin_genre_add') }}" class="btn btn-success btn-lg w-100">+ Добавить жанр</a>
</div>

<!-- Список жанров -->
<div class="card">
    <div class="card-header">
        <h4 class="mb-0">Список жанров</h4>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th class="w-75">Название</th>
                        <th class="w-25 text-end">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    {% for genre in genres %}
                    <tr>
                        <td>{{ genre.name }}</td>
                        <td class="text-end">
                            <a href="{{ url_for('admin_genre_edit', id=genre.id) }}" class="btn btn-sm btn-warning me-1">Редактировать</a>
                            <a href="#" class="btn btn-sm btn-danger delete-btn" data-url="{{ url_for('admin_genre_delete', id=genre.id) }}">Удалить</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
